<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>TaskStream - Record Editor</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container": "#e6eeff",
                        "surface-tint": "#4d44e3",
                        "surface-dim": "#ccdbf3",
                        "on-primary-fixed": "#0f0069",
                        "tertiary": "#7e3000",
                        "primary-container": "#4f46e5",
                        "on-tertiary-fixed": "#351000",
                        "on-error": "#ffffff",
                        "surface-container-low": "#eff4ff",
                        "on-secondary-fixed": "#07006c",
                        "primary-fixed-dim": "#c3c0ff",
                        "inverse-primary": "#c3c0ff",
                        "on-primary-container": "#dad7ff",
                        "surface-variant": "#d5e3fc",
                        "surface": "#f8f9ff",
                        "inverse-on-surface": "#eaf1ff",
                        "on-surface": "#0d1c2e",
                        "surface-container-lowest": "#ffffff",
                        "secondary": "#4648d4",
                        "secondary-fixed-dim": "#c0c1ff",
                        "outline": "#777587",
                        "surface-bright": "#f8f9ff",
                        "inverse-surface": "#233144",
                        "outline-variant": "#c7c4d8",
                        "on-tertiary": "#ffffff",
                        "secondary-fixed": "#e1e0ff",
                        "error-container": "#ffdad6",
                        "on-surface-variant": "#464555",
                        "secondary-container": "#6063ee",
                        "error": "#ba1a1a",
                        "surface-container-highest": "#d5e3fc",
                        "on-tertiary-fixed-variant": "#7b2f00",
                        "on-secondary-fixed-variant": "#2f2ebe",
                        "on-error-container": "#93000a",
                        "on-secondary": "#ffffff",
                        "tertiary-container": "#a44100",
                        "on-primary": "#ffffff",
                        "primary": "#3525cd",
                        "surface-container-high": "#dce9ff",
                        "tertiary-fixed": "#ffdbcc",
                        "background": "#f8f9ff",
                        "on-secondary-container": "#fffbff",
                        "on-primary-fixed-variant": "#3323cc",
                        "tertiary-fixed-dim": "#ffb695",
                        "on-background": "#0d1c2e",
                        "primary-fixed": "#e2dfff",
                        "on-tertiary-container": "#ffd2be"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "base": "4px",
                        "element-gap": "0.5rem",
                        "chip-gap": "0.25rem",
                        "container-padding": "1.5rem",
                        "section-margin": "2rem"
                    },
                    "fontFamily": {
                        "headline-sm": ["Inter"],
                        "body-sm": ["Inter"],
                        "label-md": ["Inter"],
                        "body-md": ["Inter"],
                        "label-xs": ["Inter"]
                    },
                    "fontSize": {
                        "headline-sm": ["18px", { "lineHeight": "24px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "body-sm": ["13px", { "lineHeight": "18px", "letterSpacing": "0em", "fontWeight": "400" }],
                        "label-md": ["12px", { "lineHeight": "16px", "letterSpacing": "0.02em", "fontWeight": "500" }],
                        "body-md": ["14px", { "lineHeight": "20px", "letterSpacing": "0em", "fontWeight": "400" }],
                        "label-xs": ["11px", { "lineHeight": "14px", "letterSpacing": "0.03em", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-surface text-on-surface h-screen flex flex-col antialiased">
<!-- TopNavBar -->
<header class="bg-surface dark:bg-background text-primary dark:text-primary-fixed font-headline-sm text-headline-sm docked full-width top-0 border-b border-outline-variant dark:border-outline flat no shadows flex justify-between items-center px-container-padding h-14 w-full">
<div class="font-headline-sm text-headline-sm font-bold text-primary dark:text-primary-fixed flex items-center gap-2">
            TaskStream
        </div>
<div class="flex items-center gap-4">
<!-- Search Placeholder (Right) -->
<div class="hidden md:flex items-center bg-surface-container-low rounded-full px-3 py-1 border border-outline-variant">
<span class="material-symbols-outlined text-on-surface-variant text-sm">search</span>
<input class="bg-transparent border-none text-body-sm focus:ring-0 text-on-surface w-48 placeholder-on-surface-variant ml-2 p-0 h-6" placeholder="Search..." type="text"/>
</div>
<!-- Trailing Icons -->
<button class="text-on-surface-variant dark:text-surface-variant hover:bg-surface-container-low dark:hover:bg-surface-container-highest transition-colors cursor-pointer active:opacity-70 p-1 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="filter_list">filter_list</span>
</button>
<button class="text-on-surface-variant dark:text-surface-variant hover:bg-surface-container-low dark:hover:bg-surface-container-highest transition-colors cursor-pointer active:opacity-70 p-1 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
</button>
</div>
</header>
<div class="flex flex-1 overflow-hidden">
<!-- Main Content Area -->
<main class="flex-1 overflow-y-auto p-container-padding flex justify-center items-start pt-10">
<div class="w-full max-w-[600px] bg-surface-container-lowest border border-outline-variant rounded-xl p-6 shadow-[0_1px_3px_rgba(0,0,0,0.05)]">
<div class="flex items-center justify-between mb-6">
<h1 class="font-headline-sm text-headline-sm text-on-surface">Edit Task</h1>
<!-- Unsaved feedback -->
<div class="flex items-center gap-1.5 text-tertiary-container bg-error-container/30 px-2 py-1 rounded-md">
<span class="material-symbols-outlined text-[14px]">warning</span>
<span class="font-label-xs text-label-xs">You have unsaved changes</span>
</div>
</div>
<form class="flex flex-col gap-6">
<!-- Task Name Field (Required with Error State Example) -->
<div class="flex flex-col gap-1.5">
<label class="font-label-md text-label-md text-on-surface-variant" for="taskName">Task Name <span class="text-error">*</span></label>
<input class="bg-surface-container-lowest border border-error text-on-surface font-body-md text-body-md rounded px-3 py-2 focus:outline-none focus:ring-1 focus:ring-error focus:border-error transition-colors w-full bg-error-container/10" id="taskName" name="taskName" placeholder="e.g. Q4 Financial Review" type="text" value=""/>
<span class="font-label-xs text-label-xs text-error mt-1 flex items-center gap-1">
<span class="material-symbols-outlined text-[14px]">error</span> Task name is required
                        </span>
</div>
<!-- Description Field (Optional) -->
<div class="flex flex-col gap-1.5">
<label class="font-label-md text-label-md text-on-surface-variant" for="taskDescription">Description (Optional)</label>
<textarea class="bg-surface-container-lowest border border-outline-variant text-on-surface font-body-md text-body-md rounded px-3 py-2 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary/20 transition-colors w-full resize-y" id="taskDescription" name="taskDescription" placeholder="Add detailed context or steps here..." rows="4"></textarea>
</div>
<!-- Labels/Chips (Compact Data) -->
<div class="flex flex-col gap-1.5">
<label class="font-label-md text-label-md text-on-surface-variant">Tags</label>
<div class="flex flex-wrap gap-chip-gap">
<!-- Task Chip Component -->
<div class="inline-flex items-center gap-1 bg-surface-container border border-outline-variant rounded px-2 py-1 group cursor-pointer hover:bg-surface-container-high transition-colors">
<span class="font-label-md text-label-md text-on-surface">Finance</span>
<span class="material-symbols-outlined text-[12px] text-on-surface-variant opacity-40 group-hover:opacity-100 group-hover:text-error transition-opacity">close</span>
</div>
<div class="inline-flex items-center gap-1 bg-surface-container border border-outline-variant rounded px-2 py-1 group cursor-pointer hover:bg-surface-container-high transition-colors">
<span class="font-label-md text-label-md text-on-surface">Urgent</span>
<span class="material-symbols-outlined text-[12px] text-on-surface-variant opacity-40 group-hover:opacity-100 group-hover:text-error transition-opacity">close</span>
</div>
<!-- Add Tag Button -->
<button class="inline-flex items-center gap-1 bg-surface-container-lowest border border-dashed border-outline-variant rounded px-2 py-1 hover:bg-surface-container-low transition-colors text-on-surface-variant hover:text-primary" type="button">
<span class="material-symbols-outlined text-[14px]">add</span>
<span class="font-label-md text-label-md">Add Tag</span>
</button>
</div>
</div>
<!-- Action Buttons -->
<div class="flex justify-end gap-3 mt-4 pt-4 border-t border-outline-variant">
<button class="font-label-md text-label-md px-4 py-2 rounded border border-outline-variant text-on-surface-variant hover:bg-surface-container-low transition-colors" type="button">
                            Cancel
                        </button>
<button class="font-label-md text-label-md px-4 py-2 rounded bg-primary text-on-primary hover:bg-primary/90 transition-colors shadow-sm" type="button">
                            Save Changes
                        </button>
</div>
</form>
</div>
</main>
</div>
<!-- Footer -->
<footer class="bg-surface-container-lowest dark:bg-surface-dim text-secondary dark:text-secondary-fixed font-label-xs text-label-xs docked full-width bottom-0 border-t border-outline-variant dark:border-outline flat no shadows flex justify-between items-center px-container-padding py-2 w-full">
<div class="font-label-xs text-label-xs font-bold text-on-surface-variant">
            TaskStream v1.0 • Storage: Local
        </div>
<div class="flex items-center gap-4">
<a class="text-on-surface-variant hover:text-primary dark:hover:text-primary-fixed-dim opacity-80 hover:opacity-100 transition-colors" href="#">Clear Cache</a>
<a class="text-on-surface-variant hover:text-primary dark:hover:text-primary-fixed-dim opacity-80 hover:opacity-100 transition-colors" href="#">Export JSON</a>
</div>
</footer>
</body></html>
